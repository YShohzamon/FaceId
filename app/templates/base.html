<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}FaceID Attendance{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/main.css') }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    {% block extra_head %}{% endblock %}
</head>
<body class="{% if active_page %}page-{{ active_page }}{% endif %}">

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
        <div class="logo-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="8" r="4"/>
                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                <path d="M20 8l2-2m-4 0l2 2"/>
            </svg>
        </div>
        <span class="logo-text">FaceID</span>
    </div>

    <nav class="sidebar-nav">
        <a href="{{ url_for('home') }}" class="nav-item {% if active_page == 'home' %}active{% endif %}">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9,22 9,12 15,12 15,22"/>
            </svg>
            <span>Home</span>
        </a>
        <a href="{{ url_for('recognition_page') }}" class="nav-item {% if active_page == 'recognition' %}active{% endif %}">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="3" width="20" height="14" rx="2"/>
                <path d="M8 21h8m-4-4v4"/>
                <circle cx="12" cy="10" r="3"/>
            </svg>
            <span>Live Recognition</span>
        </a>
        <a href="{{ url_for('add_student_page') }}" class="nav-item {% if active_page == 'add_student' %}active{% endif %}">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <line x1="19" y1="8" x2="19" y2="14"/>
                <line x1="22" y1="11" x2="16" y2="11"/>
            </svg>
            <span>Add Student</span>
        </a>
        <a href="{{ url_for('student_list_page') }}" class="nav-item {% if active_page == 'students' %}active{% endif %}">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            <span>Students</span>
        </a>
        <a href="{{ url_for('attendance_page') }}" class="nav-item {% if active_page == 'attendance' %}active{% endif %}">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
                <polyline points="9,16 11,18 15,14"/>
            </svg>
            <span>Attendance</span>
        </a>
        <a href="{{ url_for('settings_page') }}" class="nav-item {% if active_page == 'settings' %}active{% endif %}">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
            <span>Settings</span>
        </a>
    </nav>

    <div class="sidebar-footer">
        <div class="system-status">
            <span class="status-dot"></span>
            <span>System Ready</span>
        </div>
    </div>
</aside>

<!-- Main Content -->
<main class="main-content">
    <header class="top-bar">
        <div class="top-bar-left">
            <h1 class="page-title">{% block page_title %}Dashboard{% endblock %}</h1>
        </div>
        <div class="top-bar-right">
            <div class="top-bar-info">
                <span id="current-time" class="time-display"></span>
            </div>
        </div>
    </header>

    <div class="content-area">
        {% block content %}{% endblock %}
    </div>
</main>

<!-- Toast notifications container -->
<div id="toast-container" class="toast-container"></div>

<script src="{{ url_for('static', path='js/main.js') }}"></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
